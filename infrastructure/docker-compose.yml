# =============================================================================
# SaaS Platform — Local Docker Compose Orchestration
# =============================================================================
# Usage:
#   docker compose --env-file .env.local up --build
#   docker compose --env-file .env.local down -v
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Data Stores
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: saas-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - saas-net

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - saas-net

  # ---------------------------------------------------------------------------
  # Go Services (live-reload via cosmtrek/air)
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
      target: dev
    container_name: saas-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    volumes:
      - ../services/api-gateway:/app
    environment:
      PORT: ${API_GATEWAY_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URI: ${REDIS_URI}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

  chat-service:
    build:
      context: ../services/chat-service
      dockerfile: Dockerfile
      target: dev
    container_name: saas-chat-service
    restart: unless-stopped
    ports:
      - "${CHAT_SERVICE_PORT}:${CHAT_SERVICE_PORT}"
    volumes:
      - ../services/chat-service:/app
    environment:
      PORT: ${CHAT_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URI: ${REDIS_URI}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
      target: dev
    container_name: saas-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    volumes:
      - ../services/auth-service:/app
    environment:
      PORT: ${AUTH_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URI: ${REDIS_URI}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
      target: dev
    container_name: saas-user-service
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    volumes:
      - ../services/user-service:/app
    environment:
      PORT: ${USER_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URI: ${REDIS_URI}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
      target: dev
    container_name: saas-notification-service
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
    volumes:
      - ../services/notification-service:/app
    environment:
      PORT: ${NOTIFICATION_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URI: ${REDIS_URI}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-net

# ---------------------------------------------------------------------------
# Persistent Volumes
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  saas-net:
    driver: bridge
